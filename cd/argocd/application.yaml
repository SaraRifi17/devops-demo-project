apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-java-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SaraRifi17/devops-demo-project.git
    targetRevision: HEAD
    path: helm/app
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
